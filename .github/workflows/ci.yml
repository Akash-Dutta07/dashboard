name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Django system check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Installs the same tool you use on your laptop.
      # enable-cache reuses downloaded packages between runs, so CI stays fast.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # uv reads .python-version (3.12) and installs that exact Python itself.
      # No separate setup-python step needed.
      # --locked = install exactly what uv.lock pins, and FAIL if uv.lock
      # disagrees with pyproject.toml. That's the guard against drift.
      - name: Install dependencies
        run: uv sync --locked

      # uv run executes inside the environment uv just built.
      - name: Run Django system check
        run: uv run python manage.py check
