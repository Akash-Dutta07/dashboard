name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Django checks + tests
    runs-on: ubuntu-latest

    # ── The boxes the tests need — GitHub's version of your docker-compose.yml ──
    # GitHub starts these little Postgres + Redis boxes before the steps run,
    # then throws them away after. The tests reach them on localhost (127.0.0.1),
    # which is exactly what settings.py already defaults to — so no host config
    # is needed here.
    services:
      db:
        image: postgres:16
        env:                              # must match the job env below so Django can log in
          POSTGRES_DB: dashboard
          POSTGRES_USER: dashboard
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dashboard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    # Config for the throwaway CI machine. Your .env is git-ignored and never
    # reaches GitHub — correct, it guards your real database. CI doesn't need
    # those values, it needs its own. These are deliberately fake: they let
    # settings.py finish loading and protect nothing. Real secrets (e.g. a
    # registry token) belong in GitHub Secrets, never here.
    env:
      SECRET_KEY: ci-throwaway-secret-guards-nothing
      POSTGRES_DB: dashboard
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: postgres

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Installs the same tool you use on your laptop.
      # enable-cache reuses downloaded packages between runs, so CI stays fast.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # uv reads .python-version (3.12) and installs that exact Python itself.
      # No separate setup-python step needed.
      # --locked = install exactly what uv.lock pins, and FAIL if uv.lock
      # disagrees with pyproject.toml. That's the guard against drift.
      - name: Install dependencies
        run: uv sync --locked

      # uv run executes inside the environment uv just built.
      - name: Run Django system check
        run: uv run python manage.py check

      # Runs the 4 robots in weather/tests.py against the Postgres + Redis boxes
      # above. This is your safety net, now firing automatically on every push.
      - name: Run tests
        run: uv run python manage.py test
